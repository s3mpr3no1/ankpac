<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flashcard</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      font-family: system-ui, sans-serif;
      padding: 1rem;
      position: relative;
    }
    .load-csv {
      padding: 0.25rem 0.5rem;
      font-size: 0.8rem;
      border: 1px solid #ccc;
      background: #fff;
      cursor: pointer;
    }
    .load-csv:hover {
      background: #f5f5f5;
    }
    .top-buttons {
      position: absolute;
      top: 0.5rem;
      right: 0.5rem;
      display: flex;
      gap: 0.5rem;
    }
    .top-buttons .hidden {
      display: none;
    }
    #csv-input {
      display: none;
    }
    .card-text {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      text-align: center;
    }
    .buttons {
      display: flex;
      gap: 0.5rem;
      justify-content: center;
      padding: 1rem 0;
    }
    .buttons button {
      padding: 0.5rem 1rem;
      font-size: 1rem;
      border: 1px solid #ccc;
      background: #fff;
      cursor: pointer;
    }
    .buttons button:hover {
      background: #f5f5f5;
    }
    .buttons.hidden {
      display: none;
    }
  </style>
</head>
<body>
  <input type="file" id="csv-input" accept=".csv" />
  <div class="top-buttons">
    <button type="button" class="load-csv hidden" id="export-deck-btn">Export deck</button>
    <button type="button" class="load-csv" id="load-csv-btn">Load CSV</button>
  </div>
  <main class="card-text" id="card-text">Load cards to begin</main>
  <nav class="buttons hidden" id="flip-row">
    <button type="button" id="flip-btn">Flip card</button>
  </nav>
  <nav class="buttons hidden" id="grade-row">
    <button type="button" data-grade="0">0</button>
    <button type="button" data-grade="1">1</button>
    <button type="button" data-grade="2">2</button>
    <button type="button" data-grade="3">3</button>
    <button type="button" data-grade="4">4</button>
    <button type="button" data-grade="5">5</button>
  </nav>
  <script>
    // Card schema: front, back, interval (0), repetition (0), ease (2.5), dueDate (1/1/2000)

    var DEFAULT_DUE_DATE = new Date(2000, 0, 1).getTime();

    function parseCSVToCards(csvText) {
      var lines = csvText.trim().split(/\r?\n/);
      if (lines.length < 2) return [];
      var headers = parseCSVLine(lines[0]);
      var headersLower = headers.map(function (h) { return (h || '').toLowerCase(); });
      var frontIdx = headersLower.indexOf('front');
      var backIdx = headersLower.indexOf('back');
      var intervalIdx = headersLower.indexOf('interval');
      var repetitionIdx = headersLower.indexOf('repetition');
      var easeIdx = headersLower.indexOf('ease');
      var dueDateIdx = headersLower.indexOf('duedate');
      if (frontIdx === -1 || backIdx === -1) return [];
      var cards = [];
      for (var i = 1; i < lines.length; i++) {
        var values = parseCSVLine(lines[i]);
        if (values[frontIdx] === undefined && values[backIdx] === undefined) continue;
        cards.push({
          front: values[frontIdx] || '',
          back: values[backIdx] || '',
          interval: parseNum(values[intervalIdx], 0),
          repetition: parseNum(values[repetitionIdx], 0),
          ease: parseNum(values[easeIdx], 2.5),
          dueDate: parseNum(values[dueDateIdx], DEFAULT_DUE_DATE)
        });
      }
      return cards;
    }

    function escapeCSVField(str) {
      if (str === null || str === undefined) return '""';
      var s = String(str);
      if (/[",\r\n]/.test(s)) {
        return '"' + s.replace(/"/g, '""') + '"';
      }
      return s;
    }

    function cardsToCSV(cards) {
      var header = 'front,back,interval,repetition,ease,dueDate';
      var lines = [header];
      for (var i = 0; i < cards.length; i++) {
        var c = cards[i];
        lines.push(
          escapeCSVField(c.front) + ',' +
          escapeCSVField(c.back) + ',' +
          c.interval + ',' +
          c.repetition + ',' +
          c.ease + ',' +
          c.dueDate
        );
      }
      return lines.join('\n');
    }

    function parseCSVLine(line) {
      var out = [];
      var i = 0;
      while (i < line.length) {
        if (line[i] === '"') {
          var end = i + 1;
          var s = '';
          while (end < line.length) {
            if (line[end] === '"') {
              if (line[end + 1] === '"') {
                s += '"';
                end += 2;
              } else {
                end++;
                break;
              }
            } else {
              s += line[end];
              end++;
            }
          }
          out.push(s);
          i = line[end] === ',' ? end + 1 : end;
        } else {
          var comma = line.indexOf(',', i);
          if (comma === -1) {
            out.push(line.slice(i).trim());
            break;
          }
          out.push(line.slice(i, comma).trim());
          i = comma + 1;
        }
      }
      return out;
    }

    function parseNum(val, defaultVal) {
      if (val === undefined || val === '') return defaultVal;
      var n = Number(val);
      return isNaN(n) ? defaultVal : n;
    }

    function getEndOfToday() {
      var d = new Date();
      d.setHours(23, 59, 59, 999);
      return d.getTime();
    }

    function isCardDue(card) {
      return card.dueDate <= getEndOfToday();
    }

    function findNextDueIndex(cards, startIndex) {
      if (cards.length === 0) return -1;
      for (var i = 0; i < cards.length; i++) {
        var idx = (startIndex + i) % cards.length;
        if (isCardDue(cards[idx])) return idx;
      }
      return -1;
    }

    // initial values: interval=0, repetition=0, ease=2.5
    // item: SuperMemoItem
    // grade: 0-5
    // returns {interval, repetition, ease}

    function supermemo(interval, repetition, ease, grade) {
        console.log(`Starting Values: interval=${interval}, repetition=${repetition}, ease=${ease}, grade=${grade}`);

        if (grade >= 3) {
            if (repetition === 0) {
                interval = 1;
            } else if (repetition === 1) {
                interval = 6;
            } else {
                interval = Math.round(interval * ease);
            }

            repetition += 1;
        } else {
            repetition = 0; 
            interval = 0;
        }

        ease = ease + (0.1 - ( 5 - grade) * (0.08 + (5 - grade) * 0.02));

        if (ease < 1.3) {
            ease = 1.3;
        }
        console.log(`Ending Values: interval=${interval}, repetition=${repetition}, ease=${ease}, grade=${grade}`);
        return {
            interval,
            repetition,
            ease
        };
    }


  </script>
  <script>
    var cards = [];
    var currentIndex = 0;
    var showingFront = true;
    var cardTextEl = document.getElementById('card-text');
    var csvInput = document.getElementById('csv-input');
    var flipRow = document.getElementById('flip-row');
    var gradeRow = document.getElementById('grade-row');

    var exportDeckBtn = document.getElementById('export-deck-btn');

    function showCard() {
      if (cards.length === 0) {
        cardTextEl.textContent = 'Load cards to begin';
        flipRow.classList.add('hidden');
        gradeRow.classList.add('hidden');
        exportDeckBtn.classList.add('hidden');
        return;
      }
      exportDeckBtn.classList.remove('hidden');
      if (currentIndex < 0 || currentIndex >= cards.length || !isCardDue(cards[currentIndex])) {
        cardTextEl.textContent = 'No cards due';
        flipRow.classList.add('hidden');
        gradeRow.classList.add('hidden');
        return;
      }
      var card = cards[currentIndex];
      cardTextEl.textContent = showingFront ? card.front : card.back;
      flipRow.classList.toggle('hidden', !showingFront);
      gradeRow.classList.toggle('hidden', showingFront);
    }

    document.getElementById('load-csv-btn').onclick = function () {
      csvInput.click();
    };

    exportDeckBtn.onclick = function () {
      if (cards.length === 0) return;
      var csv = cardsToCSV(cards);
      var blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url;
      a.download = 'deck.csv';
      a.click();
      URL.revokeObjectURL(url);
    };

    csvInput.onchange = function () {
      var file = csvInput.files[0];
      if (!file) return;
      var reader = new FileReader();
      reader.onload = function (e) {
        cards = parseCSVToCards(e.target.result);
        currentIndex = findNextDueIndex(cards, 0);
        showingFront = true;
        showCard();
      };
      reader.readAsText(file, 'UTF-8');
      csvInput.value = '';
    };

    document.getElementById('flip-btn').onclick = function () {
      if (cards.length === 0 || currentIndex < 0 || !isCardDue(cards[currentIndex])) return;
      showingFront = false;
      showCard();
    };

    gradeRow.addEventListener('click', function (e) {
      var btn = e.target.closest('button[data-grade]');
      if (!btn || cards.length === 0 || currentIndex < 0) return;
      var grade = parseInt(btn.getAttribute('data-grade'), 10);
      var card = cards[currentIndex];
      var result = supermemo(card.interval, card.repetition, card.ease, grade);
      card.interval = result.interval;
      card.repetition = result.repetition;
      card.ease = result.ease;
      card.dueDate = Date.now() + result.interval * 24 * 60 * 60 * 1000;
      cards.splice(currentIndex, 1);
      cards.push(card);
      currentIndex = findNextDueIndex(cards, currentIndex);
      showingFront = true;
      showCard();
    });

    document.addEventListener('keydown', function (e) {
      if (cards.length === 0 || currentIndex < 0) return;
      if (e.key === ' ') {
        e.preventDefault();
        if (showingFront && isCardDue(cards[currentIndex])) {
          document.getElementById('flip-btn').click();
        } else if (!showingFront) {
          var grade4 = gradeRow.querySelector('button[data-grade="4"]');
          if (grade4) grade4.click();
        }
      } else if (showingFront === false && e.key >= '0' && e.key <= '5') {
        var gradeBtn = gradeRow.querySelector('button[data-grade="' + e.key + '"]');
        if (gradeBtn) gradeBtn.click();
      }
    });
  </script>
</body>
</html>
